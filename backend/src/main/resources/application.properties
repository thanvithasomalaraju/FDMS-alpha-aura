# Use environment variables when provided, otherwise default to in-memory H2 for local dev.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:madfooddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# File storage directory (relative to container or host)
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# Multipart limits - keep in sync with controller validation
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# JWT secret (placeholder). Replace in production with a secure, sufficiently long secret.
jwt.secret=${JWT_SECRET:ChangeMeInProdChangeMeInProdChangeMeInProdChangeMe}

# Server
server.port=${SERVER_PORT:8080}

# Logging
logging.level.root=INFO
logging.level.com.madfood.backend=INFO

# Allowed origins for CORS, comma-separated
app.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
