# Spring Boot application properties with environment-aware fallbacks

# Use environment variables when provided, otherwise default to in-memory H2 for local dev.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:madfooddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# File storage directory (relative to container or host)
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# JWT secret (placeholder). Replace in production with a secure, sufficiently long secret.
jwt.secret=${JWT_SECRET:ChangeMeInProdChangeMeInProdChangeMeInProdChangeMe}

# Server
server.port=${SERVER_PORT:8080}
