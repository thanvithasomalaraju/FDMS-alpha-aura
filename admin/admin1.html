<!DOCTYPE html>
<html lang="en" data-theme="custom">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad Foods Enterprise Admin Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ----- NEW BURGUNDY + BEIGE THEME (no functional changes) ----- */
        :root {
            --bg: #f8f3ed;          /* beige background */
            --bg-2: #f5efe8;        /* softer beige */
            --surface: #fcf9f5;     /* light beige surface */
            --surface-2: #f3ede6;   /* slightly deeper beige */
            --border: #e2d6c8;      /* beige-brown border */
            --text: #3e2c26;        /* dark brown (readable) */
            --muted: #7a655c;       /* warm muted brown */

            --brand: #6a1e2a;       /* burgundy primary */
            --brand-2: #8a2a3a;     /* lighter burgundy for gradients */
            --brand-light: #b54a5a; /* accent burgundy */

            --success: #2d7a4a;
            --info: #3a7ca5;
            --warning: #b68b40;
            --danger: #b13e4b;

            --radius: 14px;
            --shadow: 0 10px 30px rgba(60, 40, 30, 0.12);
        }

        /* keep light/dark toggle but use beige/burgundy in both modes */
        [data-theme="light"] {
            --bg: #f8f3ed;
            --bg-2: #f5efe8;
            --surface: #fcf9f5;
            --surface-2: #f3ede6;
            --border: #e2d6c8;
            --text: #3e2c26;
            --muted: #7a655c;
            --shadow: 0 6px 20px rgba(60, 40, 30, 0.08);
        }

        [data-theme="dark"] {
            --bg: #2b1e1a;          /* dark beige-brown background */
            --bg-2: #342620;        /* darker */
            --surface: #3d2d26;     /* deep warm */
            --surface-2: #4a3830;
            --border: #5f4a40;
            --text: #f0e6df;
            --muted: #b8a69b;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* burgundy buttons & accents */
        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            border: none;
            color: #f8f3ed;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 14px 20px;
            border-radius: 40px;
            letter-spacing: 0.5px;
            transition: 0.2s;
            width: 100%;
            max-width: 300px;
            margin: 22px auto 12px;
            display: block;
            text-align: center;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--brand-2), var(--brand-light));
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(106, 30, 42, 0.3);
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            border-color: transparent;
            color: #f8f3ed;
        }
        .btn.primary:hover {
            background: linear-gradient(135deg, var(--brand-2), var(--brand-light));
            border-color: var(--brand);
        }

        /* LOGO FIX: ensure burger icon and background are vivid */
        .brand-mark {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            box-shadow: 0 8px 20px rgba(106, 30, 42, 0.4);
            color: #f8f3ed;
            width: 56px;
            height: 56px;
            display: grid;
            place-items: center;
            border-radius: 16px;
            font-size: 28px;
        }
        .logo-icon {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: #f8f3ed;
            width: 40px;
            height: 40px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(106, 30, 42, 0.25);
        }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(106, 30, 42, 0.18), rgba(138, 42, 58, 0.08));
            color: var(--brand);
        }
        .nav-link:hover {
            background: var(--surface);
            color: var(--text);
        }
        .icon-btn .dot {
            background: var(--brand);
        }
        .avatar {
            background: linear-gradient(135deg, var(--info), var(--brand));
        }
        .badge.brand {
            background: rgba(106, 30, 42, 0.15);
            color: var(--brand);
            border-color: rgba(106, 30, 42, 0.3);
        }
        .kpi.brand .kpi-icon {
            background: rgba(106, 30, 42, 0.15);
            color: var(--brand);
        }
        .progress > div {
            background: linear-gradient(90deg, var(--brand), var(--brand-2));
        }
        .live-item {
            border-left-color: var(--brand);
        }
        .profile-uploader {
            background: linear-gradient(135deg, var(--info), var(--brand));
        }
        .profile-uploader small {
            background: var(--brand);
        }
        .toast {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: #f8f3ed;
        }
        .chat-message {
            background: rgba(106, 30, 42, 0.12);
        }
        .heatmap > div {
            border-left-color: var(--brand);
        }

        /* keep all other styles exactly as before – only colours changed */
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        a {
            color: inherit;
            text-decoration: none;
            cursor: pointer;
        }
        button {
            font-family: inherit;
            cursor: pointer;
        }
        .hidden {
            display: none !important;
        }
        .muted {
            color: var(--muted);
        }
        .tiny {
            font-size: 12px;
        }

        /* LOGIN */
        .login-screen {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            background:
                radial-gradient(800px 400px at 80% 10%, rgba(106, 30, 42, 0.12), transparent 60%),
                radial-gradient(700px 500px at 10% 90%, rgba(58, 124, 165, 0.10), transparent 60%),
                var(--bg);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .login-card h1 {
            margin: 20px 0 4px;
            font-size: 24px;
        }
        .login-card p, .login-card small {
            color: var(--muted);
        }
        .login-card label {
            display: block;
            margin: 16px 0 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left;
        }
        .login-card input {
            width: 100%;
            padding: 12px 14px;
            color: var(--text);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }
        .login-card input:focus {
            border-color: var(--brand);
        }

        /* SHELL */
        .shell {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            min-height: 100vh;
        }
        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 20px 14px;
            overflow-y: auto;
            background: var(--bg-2);
            border-right: 1px solid var(--border);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding: 0 8px 20px;
            border-bottom: 1px solid var(--border);
        }
        .logo-title {
            font-size: 15px;
            font-weight: 800;
        }
        .logo-sub {
            color: var(--muted);
            font-size: 11px;
        }
        .nav-group {
            padding: 14px 12px 6px;
            color: var(--muted);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 12px;
            color: var(--muted);
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.15s ease;
        }
        .nav-link span {
            font-size: 16px;
        }

        /* MAIN */
        .main {
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            background: rgba(248, 243, 237, 0.85);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }
        [data-theme="dark"] .topbar {
            background: rgba(43, 30, 26, 0.85);
        }
        .search {
            flex: 1;
            max-width: 480px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .search input {
            flex: 1;
            min-width: 0;
            color: var(--text);
            background: transparent;
            border: none;
            outline: none;
            font-size: 13.5px;
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }
        .icon-btn {
            position: relative;
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
        }
        .icon-btn:hover {
            border-color: var(--brand);
        }
        .avatar {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            color: #f8f3ed;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
        }
        .content {
            width: 100%;
            max-width: 1600px;
            padding: 28px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .page-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
        }
        .page-header p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13.5px;
        }
        .page-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        .btn:hover {
            border-color: var(--brand);
        }
        .btn.success {
            color: #f8f3ed;
            background: var(--success);
            border-color: transparent;
        }
        .btn.danger {
            color: #f8f3ed;
            background: var(--danger);
            border-color: transparent;
        }
        .btn.warning {
            color: #3e2c26;
            background: var(--warning);
            border-color: transparent;
        }

        /* KPI */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi {
            position: relative;
            overflow: hidden;
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .kpi-label {
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .kpi-value {
            mutation truncated for brevity
        }
    </style>
</head>

<body>

    <!-- ================= LOGIN SCREEN ================= -->

    <section class="login-screen" id="loginScreen">

        <div class="login-card">

            <div class="brand-mark" style="margin:0 auto;">
                <i class="fa-solid fa-burger"></i>
            </div>

            <h1>Mad Foods Admin</h1>

            <p>Enterprise food delivery control center</p>

            <label>Email</label>
            <input type="email" id="loginEmail" value="admin@madfoods.com">

            <label>Password</label>
            <input type="password" id="loginPassword" value="admin123">

            <!-- BIG & CENTERED LOGIN BUTTON -->
            <button class="btn-primary" id="loginBtn">
                Login to Dashboard
            </button>

            <small style="display:block; margin-top:8px;">
                Demo Login: admin@madfoods.com / admin123
            </small>

        </div>

    </section>

    <!-- ================= APP SHELL ================= -->

    <section class="shell hidden" id="appShell">

        <!-- SIDEBAR -->

        <aside class="sidebar" id="sidebar">

            <div class="logo">
                <div class="logo-icon">
                    <i class="fa-solid fa-burger"></i>
                </div>

                <div>
                    <div class="logo-title">Mad Foods</div>
                    <div class="logo-sub">Enterprise Admin</div>
                </div>
            </div>

            <div class="nav-group">Overview</div>

            <a class="nav-link active" data-page="dashboard">
                <span>📊</span> Master Dashboard
            </a>

            <a class="nav-link" data-page="analytics">
                <span>📈</span> Revenue Analytics
            </a>

    </section>

    <script src="frontend/js/admin-integration.js"></script>
</body>
</html>
