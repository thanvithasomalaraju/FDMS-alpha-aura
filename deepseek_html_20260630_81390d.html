<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mad Food · Partner Portal</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #E2939A;
            --primary-dark: #c97a82;
            --secondary: #4C389F;
            --accent: #9A5E40;
            --cream: #FBF5F0;
            --eggshell: #C9CDCA;
            --olive: #78892C;
            --glass-bg: rgba(255, 245, 240, 0.25);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-dark: #2d2a24;
            --text-light: #e8e0d8;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            --radius: 28px;
        }

        body {
            background: var(--cream);
            color: var(--text-dark);
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
        }

        body.dark {
            background: #1e1b18;
            color: var(--text-light);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f0e4dc; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 12px; }

        /* ===== LOADER ===== */
        .loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--cream);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
        }
        .dark .loader { background: #1e1b18; }
        .loader.hidden { opacity: 0; pointer-events: none; }
        .loader i { font-size: 4rem; color: var(--primary); animation: spin 1s infinite linear; }
        .loader p { margin-top: 16px; font-weight: 500; letter-spacing: 2px; opacity: 0.6; }

        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }

        /* ===== GLASSMORPHISM ===== */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            border-radius: var(--radius);
        }

        .dark .glass {
            background: rgba(40, 35, 30, 0.4);
            border-color: rgba(255, 215, 200, 0.08);
        }

        /* ===== BACKGROUND BLOBS ===== */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
            animation: floatBlob 18s infinite alternate ease-in-out;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
        .blob-2 { width: 500px; height: 500px; background: var(--accent); bottom: -100px; right: -100px; animation-delay: 4s; }
        .blob-3 { width: 300px; height: 300px; background: var(--olive); top: 40%; left: 60%; animation-delay: 8s; opacity: 0.12; }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -40px) scale(1.1); }
        }

        /* ===== FLORAL PATTERN ===== */
        .floral-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.06;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 C38 15, 55 15, 45 25 C55 35, 45 55, 3[...]');
            background-size: 60px 60px;
        }
        .dark .floral-bg { opacity: 0.03; }

        /* ===== CONTAINER ===== */
        .app {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 30px;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            color: var(--secondary);
            cursor: pointer;
            transition: 0.3s;
        }

    </style>
</head>
<body>

    <!-- ===== LOADER ===== -->
    <div class="loader" id="loader">
        <i class="fas fa-utensil-spoon"></i>
        <p>Mad Food</p>
    </div>

    <!-- ===== CUSTOM CURSOR ===== -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- ===== BACKGROUND BLOBS ===== -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="floral-bg"></div>

    <!-- ===== APP ===== -->
    <div class="app">

        <!-- ===== NAVBAR ===== -->
        <nav class="navbar">
            <div class="logo" id="logo"><i class="fas fa-leaf"></i> Mad Food</div>
            <div class="nav-links" id="navLinks">
                <a data-page="home">Home</a>
                <a data-page="about">About</a>
                <a data-page="features">Features</a>
                <a href="admin/admin1.html" class="admin-login-btn"><i class="fas fa-user-shield"></i> Login</a>
            </div>
            <div class="nav-actions">
                <button class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i></button>
                <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </nav>

        <!-- Content omitted for brevity -->

    </div>

    <!-- ===== SCROLL TO TOP ===== -->
    <button class="scroll-top" id="scrollTop"><i class="fas fa-arrow-up"></i></button>

    <!-- ============================================================ -->
    <!-- ===== JAVASCRIPT ===== -->
    <!-- ============================================================ -->

    <script>
        (function() {
            'use strict';
            // existing inline JS omitted for brevity
        })();
    </script>

    <script src="frontend/js/portal-integration.js"></script>
</body>
</html>
