# ===== SERVER CONFIGURATION =====
server.port=8080
server.servlet.context-path=/api

# ===== DATABASE CONFIGURATION =====
spring.datasource.url=jdbc:mysql://localhost:3306/mad_food_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA/HIBERNATE CONFIGURATION =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== FILE UPLOAD CONFIGURATION =====
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads

# ===== JWT CONFIGURATION =====
jwt.secret=MadFoodDeliverySystemSecretKeyFor2024VerificationAndSecurityPurpose
jwt.expiration=604800000

# ===== CORS CONFIGURATION =====
server.cors.allowed-origins=http://localhost:3000,http://localhost:8000,http://127.0.0.1:5500
server.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
server.cors.allowed-headers=Content-Type,Authorization

# ===== APPLICATION LOGGING =====
logging.level.root=INFO
logging.level.com.madfood=DEBUG
logging.level.org.springframework.security=DEBUG
